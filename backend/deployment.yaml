apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend
        image: codefuns/cashbot:v5
        imagePullPolicy: Always

        ports:
        - containerPort: 8080

        env:
        - name: DB_HOST
          value: mysql

        - name: DB_PORT
          value: "3306"

        - name: DB_NAME
          value: orderdb

        - name: DB_USER
          value: root

        - name: DB_PASSWORD
          value: root123

        - name: REDIS_HOST
          value: redis

        - name: REDIS_PORT
          value: "6379"

        - name: REDIS_DATABASE
          value: "1"

        - name: REDIS_SSL_ENABLED
          value: "false"

        - name: REDIS_PASSWORD
          value: "redis123"