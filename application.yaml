apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cashbot
  namespace: gitops

spec:
  project: default

  source:
    repoURL: https://github.com/codefunss/gitops-cashbot.git
    targetRevision: HEAD
    path: .

  destination:
    server: https://kubernetes.default.svc
    namespace: app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
    - CreateNamespace=true